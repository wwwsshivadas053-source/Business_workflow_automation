<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - BPA Suite</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#004ccd',
                        background: '#f7f9fd',
                        'outline-variant': '#dde1e6',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f7f9fd;
            color: #191c1f;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative">
    
    <!-- Background Design Details -->
    <div class="absolute w-[450px] h-[450px] bg-blue-100/40 rounded-full blur-[100px] -top-20 -left-20 pointer-events-none"></div>
    <div class="absolute w-[500px] h-[500px] bg-indigo-100/30 rounded-full blur-[100px] -bottom-20 -right-20 pointer-events-none"></div>
    
    <div class="max-w-md w-full bg-white border border-outline-variant p-8 md:p-10 rounded-2xl flex flex-col gap-6 shadow-sm relative z-10">
        
        <div class="text-center space-y-2">
            <div class="inline-flex p-3 bg-blue-50 text-primary border border-blue-100 rounded-xl mb-1 shadow-sm">
                <span class="material-symbols-outlined text-[32px]">person_add</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Create Account</h1>
            <p class="text-sm text-slate-500 font-medium">Register a profile in the BPA Suite system</p>
        </div>

        <!-- FLASH NOTIFICATIONS -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="space-y-2">
              {% for category, msg in messages %}
                <div class="px-4 py-2.5 rounded-xl text-xs font-semibold border flex justify-between items-center transition-all
                  {% if category == 'danger' or category == 'error' %}
                    bg-red-50 text-red-700 border-red-100
                  {% else %}
                    bg-emerald-50 text-emerald-700 border-emerald-100
                  {% endif %}">
                  <span>{{ msg }}</span>
                  <button onclick="this.parentElement.remove()" class="material-symbols-outlined text-[16px] opacity-70 hover:opacity-100">close</button>
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <!-- FORM -->
        <form action="/register" method="POST" class="space-y-4">
            <div class="space-y-1">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Full Name</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">badge</span>
                    <input type="text" name="name" required placeholder="John Doe" 
                        class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 outline-none focus:border-primary focus:ring-4 focus:ring-blue-100 transition-all placeholder:text-slate-400" />
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Email Address</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
                    <input type="email" name="email" required placeholder="john.doe@company.com" 
                        class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 outline-none focus:border-primary focus:ring-4 focus:ring-blue-100 transition-all placeholder:text-slate-400" />
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Department</label>
                    <select name="department" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 outline-none focus:border-primary focus:ring-4 focus:ring-blue-100 transition-all">
                        <option>Engineering</option>
                        <option>Product</option>
                        <option>Marketing</option>
                        <option>Sales</option>
                        <option>HR</option>
                        <option>IT</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Role</label>
                    <select name="role" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 outline-none focus:border-primary focus:ring-4 focus:ring-blue-100 transition-all">
                        <option value="Employee">Employee</option>
                        <option value="Manager">Manager</option>
                        <option value="HR">HR Specialist</option>
                        <option value="Admin">Administrator</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Password</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
                    <input type="password" name="password" required placeholder="••••••••••••" 
                        class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 outline-none focus:border-primary focus:ring-4 focus:ring-blue-100 transition-all placeholder:text-slate-400" />
                </div>
            </div>

            <button type="submit" class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:opacity-95 transition-all shadow-md shadow-blue-500/10 hover:scale-[1.01] active:scale-[0.99] flex items-center justify-center gap-2 mt-2">
                <span class="material-symbols-outlined text-[20px]">how_to_reg</span> Register Account
            </button>
        </form>

        <div class="text-center text-xs text-slate-500 border-t border-slate-100 pt-5">
            Already have an account? <a href="/login" class="font-semibold text-primary hover:underline transition-colors">Log in here</a>
        </div>

    </div>
</body>
</html>
